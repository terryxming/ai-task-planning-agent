    <h1>Task Execution Pack 人工审阅</h1>
    <h2>审阅人</h2>
    <p>记录姓名、角色和审阅日期。</p>
    <h2>门禁摘要</h2>
    <p>记录 evaluator status、release recommendation 和未解决 blockers。</p>
